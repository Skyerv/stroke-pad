<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzi Practice Sheet Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- 🔥 Titlebar custom -->
  <div class="titlebar">
    <div class="title">StrokePad</div>

    <div class="window-controls">
      <button id="min-btn">—</button>
      <button id="max-btn">⬜</button>
      <button id="close-btn">✕</button>
    </div>
  </div>

  <div class="app-shell">
    <main class="app">
      <header class="app-header">
        <p class="eyebrow">Study Mode</p>
        <h1>Hanzi Practice Sheet Generator</h1>
        <p class="subtitle">Paste comma-separated hanzi words and create a printable worksheet in seconds.</p>
      </header>

      <section class="panel">
        <label for="text-input">Hanzi list</label>
        <textarea id="text-input" placeholder="安装, 岸, 暗, 熬夜, 把握, 摆"></textarea>

        <div class="controls">
          <label for="grid-count">Grid boxes per row</label>
          <input id="grid-count" type="number" min="4" max="20" value="10">
        </div>

        <button id="generate-btn" class="generate-btn">Generate PDF</button>
        <p id="status" class="status">Idle</p>
      </section>
    </main>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
