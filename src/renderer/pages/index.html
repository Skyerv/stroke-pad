<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzi Practice Sheet Generator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="titlebar">
    <div class="title">StrokePad</div>
    <div class="window-controls">
      <button id="min-btn" type="button" aria-label="Minimize window">-</button>
      <button id="max-btn" type="button" aria-label="Toggle maximize window">[]</button>
      <button id="close-btn" type="button" aria-label="Close window">x</button>
    </div>
  </div>

  <div class="app-shell">
    <main class="app">
      <header class="app-header">
        <p class="eyebrow">Study Mode</p>
        <h1>Hanzi Practice Sheet Generator</h1>
        <p class="subtitle">Paste comma-separated hanzi words and create a printable worksheet in seconds.</p>
      </header>

      <section class="panel">
        <div class="lesson-selector" aria-label="HSK lesson selector">
          <div class="selector-field">
            <label for="hsk-level">HSK level</label>
            <select id="hsk-level"></select>
          </div>
          <div class="selector-field">
            <label for="hsk-lesson">Lesson</label>
            <select id="hsk-lesson"></select>
          </div>
        </div>

        <label for="text-input">Hanzi list</label>
        <textarea id="text-input" placeholder="安装, 岸, 暗, 熬夜, 把握, 摆"></textarea>

        <div class="controls">
          <label for="practice-rows">Practice rows</label>
          <input id="practice-rows" type="number" min="1" max="8" value="2">
        </div>

        <button id="generate-btn" class="generate-btn" type="button">Generate PDF</button>
        <p id="status" class="status">Idle</p>
      </section>
    </main>
  </div>

  <script type="module" src="../index.js"></script>
</body>
</html>
